definitions:
  config:
    /hst:hst/hst:configurations/hst:default/hst:catalog/brxm-discovery-catalog:
      jcr:primaryType: hst:containeritempackage
      /search:
        jcr:primaryType: hst:containeritemcomponent
        hst:componentclassname: org.bloomreach.forge.discovery.site.component.DiscoverySearchComponent
        hst:label: Discovery Search
        hst:template: brxdis-search
        hst:xtype: hst.Item
        hst:parameternames: [label, pageSize, defaultSort, catalogName,
                              placeholder, resultsPage,
                              suggestionsEnabled, suggestionsLimit, minChars, debounceMs]
        hst:parametervalues: ['default', '12', '', '', 'Search...', '',
                               'true', '5', '2', '250']
      /category:
        jcr:primaryType: hst:containeritemcomponent
        hst:componentclassname: org.bloomreach.forge.discovery.site.component.DiscoveryCategoryComponent
        hst:label: Discovery Category Browse
        hst:template: brxdis-category
        hst:xtype: hst.Item
        hst:parameternames: [label]
        hst:parametervalues: ['default']
      /recommendations:
        jcr:primaryType: hst:containeritemcomponent
        hst:componentclassname: org.bloomreach.forge.discovery.site.component.DiscoveryRecommendationComponent
        hst:label: Discovery Recommendations
        hst:template: brxdis-recommendations
        hst:xtype: hst.Item
        hst:parameternames: [document, contextProductId, contextProductPidProperty, limit]
        hst:parametervalues: ['', '', 'brxdis:pid', '8']
      /product-grid:
        jcr:primaryType: hst:containeritemcomponent
        hst:componentclassname: org.bloomreach.forge.discovery.site.component.DiscoveryProductGridComponent
        hst:label: Discovery Product Grid
        hst:template: brxdis-product-grid
        hst:xtype: hst.Item
        hst:parameternames: [connectTo]
        hst:parametervalues: ['default']
      /facets:
        jcr:primaryType: hst:containeritemcomponent
        hst:componentclassname: org.bloomreach.forge.discovery.site.component.DiscoveryFacetComponent
        hst:label: Discovery Facets
        hst:template: brxdis-facets
        hst:xtype: hst.Item
        hst:parameternames: [connectTo]
        hst:parametervalues: ['default']
      /product-detail:
        jcr:primaryType: hst:containeritemcomponent
        hst:componentclassname: org.bloomreach.forge.discovery.site.component.DiscoveryProductDetailComponent
        hst:label: Discovery Product Detail
        hst:template: brxdis-product-detail
        hst:xtype: hst.Item
      /category-highlight:
        jcr:primaryType: hst:containeritemcomponent
        hst:componentclassname: org.bloomreach.forge.discovery.site.component.DiscoveryCategoryHighlightComponent
        hst:label: Discovery Category Highlight
        hst:template: brxdis-category-highlight
        hst:xtype: hst.Item
        hst:parameternames: [document1, document2, document3, document4]
        hst:parametervalues: ['', '', '', '']
      /product-highlight:
        jcr:primaryType: hst:containeritemcomponent
        hst:componentclassname: org.bloomreach.forge.discovery.site.component.DiscoveryProductHighlightComponent
        hst:label: Discovery Product Highlight
        hst:template: brxdis-product-highlight
        hst:xtype: hst.Item
        hst:parameternames: [document1, document2, document3, document4]
        hst:parametervalues: ['', '', '', '']
