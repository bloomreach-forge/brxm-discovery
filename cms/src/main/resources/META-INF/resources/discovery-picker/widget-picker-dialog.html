<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Select Widget</title>
  <link rel="stylesheet" href="picker-dialog.css"/>
  <style>
    /* Force the dialog iframe to expand to a usable size.
       Inline styles are measured synchronously; external CSS may arrive
       after the CMS snapshots the iframe dimensions for auto-sizing. */
    html, body { width: 100%; height: 100%; min-width: 700px; min-height: 460px; }
  </style>
</head>
<body>

<div id="toolbar" class="toolbar">
  <input id="filter-input" class="search-input" type="search" placeholder="Filter by name, type or ID&hellip;" autocomplete="off"/>
  <span id="result-count" class="result-count"></span>
</div>

<div id="table-scroll" class="table-scroll">
  <table id="widget-table" class="picker-table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Type</th>
        <th>ID</th>
        <th>Status</th>
        <th>Description</th>
      </tr>
    </thead>
    <tbody id="widget-body"></tbody>
  </table>
</div>

<div id="footer"></div>

<script src="ui-extension.min.js"></script>
<script src="picker-utils.js"></script>
<script>
  stretchDialogIframe();
  syncBodyToViewport();

  (function () {
    "use strict";

    var ui           = null;
    var configPath   = "";
    var currentValue = "";
    var widgetsAll   = [];

    var filterInput = document.getElementById("filter-input");
    var resultCount = document.getElementById("result-count");
    var widgetBody  = document.getElementById("widget-body");
    var footer      = document.getElementById("footer");

    /* ---- Bootstrap ---------------------------------------------------- */
    UiExtension.register().then(function (registeredUi) {
      ui = registeredUi;
      return ui.dialog.options();
    })
    .then(function (opts) {
      var data = {};
      try { data = JSON.parse(opts.value || "{}"); } catch (e) {}
      configPath   = data.configPath   || "";
      currentValue = data.currentValue || "";
      loadWidgets();
    })
    .catch(function (err) {
      setStatusEl(footer, "error", "Failed to initialise: " + (err && err.message || err));
    });

    /* ---- Filter ------------------------------------------------------- */
    filterInput.addEventListener("input", function () {
      applyFilter(filterInput.value);
    });

    function applyFilter(q) {
      var lower = q.toLowerCase();
      var filtered = lower
        ? widgetsAll.filter(function (w) {
            return (w.name || "").toLowerCase().indexOf(lower) >= 0 ||
                   (w.type || "").toLowerCase().indexOf(lower) >= 0 ||
                   (w.id   || "").toLowerCase().indexOf(lower) >= 0;
          })
        : widgetsAll;
      renderTable(filtered);
      resultCount.textContent = lower
        ? filtered.length + " of " + widgetsAll.length
        : widgetsAll.length + " widget(s)";
    }

    /* ---- Load ---------------------------------------------------------- */
    function loadWidgets() {
      if (!configPath) {
        setStatusEl(footer, "error", "No configPath configured on the uiExtension node.");
        return;
      }
      setStatusEl(footer, "", "Loading\u2026", true);

      var url = buildApiUrl(ui, "/discovery/picker/widgets", { configPath: configPath });
      fetch(url, { credentials: "include" })
        .then(function (res) {
          if (!res.ok) throw new Error("HTTP " + res.status);
          return res.json();
        })
        .then(function (widgets) {
          widgetsAll = widgets || [];
          renderTable(widgetsAll);
          resultCount.textContent = widgetsAll.length + " widget(s)";
          setStatusEl(footer, "", "Click a row to select.");
          filterInput.focus();
        })
        .catch(function (err) {
          setStatusEl(footer, "error", "Failed to load widgets: " + err.message);
        });
    }

    /* ---- Render -------------------------------------------------------- */
    function renderTable(widgets) {
      widgetBody.replaceChildren();
      if (!widgets.length) {
        var tr = document.createElement("tr");
        var td = document.createElement("td");
        td.colSpan     = 5;
        td.className   = "empty-cell";
        td.textContent = "No widgets found.";
        tr.appendChild(td);
        widgetBody.appendChild(tr);
        return;
      }
      widgets.forEach(function (w) {
        var tr = document.createElement("tr");
        tr.className = "picker-row" + (w.id === currentValue ? " selected" : "");

        var tdName = document.createElement("td");
        tdName.className   = "td-name";
        tdName.textContent = w.name || "";

        var tdType = document.createElement("td");
        var pill = document.createElement("span");
        pill.className   = "type-pill " + typePillClass(w.type);
        pill.textContent = w.type || "\u2014";
        tdType.appendChild(pill);

        var tdId = document.createElement("td");
        tdId.className   = "td-id";
        tdId.textContent = w.id || "";

        var tdStatus = document.createElement("td");
        var badge = document.createElement("span");
        badge.className   = "badge " + (w.enabled ? "badge-enabled" : "badge-disabled");
        badge.textContent = w.enabled ? "Enabled" : "Disabled";
        tdStatus.appendChild(badge);

        var tdDesc = document.createElement("td");
        tdDesc.className   = "td-desc";
        tdDesc.title       = w.description || "";
        tdDesc.textContent = w.description || "";

        tr.appendChild(tdName);
        tr.appendChild(tdType);
        tr.appendChild(tdId);
        tr.appendChild(tdStatus);
        tr.appendChild(tdDesc);

        tr.addEventListener("click", function () {
          ui.dialog.close(w.id);
        });

        widgetBody.appendChild(tr);
      });
    }

    function typePillClass(type) {
      var map = {
        item:     "type-item",
        category: "type-category",
        keyword:  "type-keyword",
        recs:     "type-recs",
        mlt:      "type-mlt"
      };
      return map[(type || "").toLowerCase()] || "type-default";
    }
  }());
</script>
</body>
</html>
