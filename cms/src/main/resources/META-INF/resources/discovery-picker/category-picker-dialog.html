<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Select Category</title>
  <link rel="stylesheet" href="picker-dialog.css"/>
  <style>
    html, body { width: 100%; height: 100%; min-width: 500px; min-height: 420px; }
  </style>
</head>
<body>

<div id="toolbar" class="toolbar">
  <input id="search-input" class="search-input" type="search" placeholder="Search categories&hellip;" autocomplete="off"/>
  <span id="result-count" class="result-count"></span>
</div>

<div id="table-scroll" class="table-scroll">
  <table id="category-table" class="picker-table">
    <thead>
      <tr>
        <th>Name</th>
        <th>ID</th>
      </tr>
    </thead>
    <tbody id="category-body"></tbody>
  </table>
</div>

<div id="footer"></div>

<script src="ui-extension.min.js"></script>
<script src="picker-utils.js"></script>
<script>
  stretchDialogIframe();
  syncBodyToViewport();

  (function () {
    "use strict";

    var ui            = null;
    var documentId    = "";
    var currentValue  = "";
    var channelId     = "";
    var categoriesAll = [];

    var searchInput  = document.getElementById("search-input");
    var resultCount  = document.getElementById("result-count");
    var categoryBody = document.getElementById("category-body");
    var footer       = document.getElementById("footer");

    /* ---- Bootstrap ---------------------------------------------------- */
    UiExtension.register().then(function (registeredUi) {
      ui = registeredUi;
      return ui.dialog.options();
    })
    .then(function (opts) {
      var data = {};
      try { data = JSON.parse(opts.value || "{}"); } catch (e) {}
      documentId   = data.documentId   || "";
      currentValue = data.currentValue || "";
      channelId    = data.channelId    || "";
      loadCategories();
      searchInput.focus();
    })
    .catch(function (err) {
      setStatusEl(footer, "error", "Failed to initialise: " + (err && err.message || err));
    });

    /* ---- Filter — client-side ----------------------------------------- */
    searchInput.addEventListener("input", function () {
      applyFilter(searchInput.value);
    });

    function applyFilter(q) {
      var lower = q.toLowerCase();
      var filtered = lower
        ? categoriesAll.filter(function (c) {
            return (c.name || "").toLowerCase().indexOf(lower) >= 0 ||
                   (c.id   || "").toLowerCase().indexOf(lower) >= 0;
          })
        : categoriesAll;
      renderTable(filtered);
      resultCount.textContent = lower
        ? filtered.length + " of " + categoriesAll.length
        : categoriesAll.length + " categor" + (categoriesAll.length === 1 ? "y" : "ies");
    }

    /* ---- Load (single fetch — all categories at once) ----------------- */
    function loadCategories() {
      if (!documentId) {
        setStatusEl(footer, "error", "No documentId available — cannot resolve Discovery config.");
        return;
      }
      setStatusEl(footer, "", "Loading\u2026", true);

      var url = buildApiUrl(ui, "/discovery/picker/categories", { channelId: channelId, documentId: documentId });
      fetch(url, { credentials: "include" })
        .then(function (res) {
          if (!res.ok) throw new Error("HTTP " + res.status);
          return res.json();
        })
        .then(function (categories) {
          categoriesAll = categories || [];
          renderTable(categoriesAll);
          resultCount.textContent = categoriesAll.length + " categor" + (categoriesAll.length === 1 ? "y" : "ies");
          setStatusEl(footer, "", "Click a row to select.");
        })
        .catch(function (err) {
          setStatusEl(footer, "error", "Failed to load categories: " + err.message);
        });
    }

    /* ---- Render -------------------------------------------------------- */
    function renderTable(categories) {
      categoryBody.replaceChildren();
      if (!categories.length) {
        var tr = document.createElement("tr");
        var td = document.createElement("td");
        td.colSpan   = 2;
        td.className = "empty-cell";
        td.textContent = "No categories found.";
        tr.appendChild(td);
        categoryBody.appendChild(tr);
        return;
      }
      categories.forEach(function (cat) {
        var tr = document.createElement("tr");
        tr.className = "picker-row" + (cat.id === currentValue ? " selected" : "");

        var tdName = document.createElement("td");
        tdName.className   = "td-name";
        tdName.textContent = cat.name || cat.id || "";

        var tdId = document.createElement("td");
        tdId.className   = "td-id";
        tdId.textContent = cat.id || "";

        tr.appendChild(tdName);
        tr.appendChild(tdId);

        tr.addEventListener("click", function () {
          ui.dialog.close(cat.id);
        });

        categoryBody.appendChild(tr);
      });
    }
  }());
</script>
</body>
</html>
