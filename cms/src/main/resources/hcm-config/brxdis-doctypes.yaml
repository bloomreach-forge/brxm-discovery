            jcr:primaryType: brxdis:categoryDocument
            hippostd:holder: holder
            hippostd:state: draft
            hippostdpubwf:createdBy: ''
            hippostdpubwf:creationDate: 2013-09-16T18:03:51.692+02:00
            hippostdpubwf:lastModificationDate: 2013-09-16T18:03:51.691+02:00
            hippostdpubwf:lastModifiedBy: ''
            brxdis:displayName: ''
            brxdis:categoryId: ''
        /editor:templates:
          jcr:primaryType: editor:templateset
          /_default_:
            jcr:primaryType: frontend:plugincluster
            frontend:properties: ['mode']
            frontend:references: ['wicket.model', 'engine', 'model.compareTo']
            frontend:services: ['wicket.id']
            type: brxdis:categoryDocument
            /root:
              jcr:primaryType: frontend:plugin
              plugin.class: 'org.hippoecm.frontend.service.render.ListViewPlugin'
              item: '${cluster.id}.field'
            /displayName:
              jcr:primaryType: frontend:plugin
