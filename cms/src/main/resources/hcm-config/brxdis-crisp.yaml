definitions:
  config:
    /hippo:configuration/hippo:modules/crispregistry/hippo:moduleconfig/crisp:resourceresolvercontainer/discoverySearchAPI:
      jcr:primaryType: crisp:resourceresolver
      crisp:sitescopes:
        - platform
      crisp:beandefinition: |
        <beans xmlns="http://www.springframework.org/schema/beans"
               xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
               xsi:schemaLocation="http://www.springframework.org/schema/beans
                                   http://www.springframework.org/schema/beans/spring-beans-4.3.xsd">
          <bean parent="abstractCrispSimpleJacksonRestTemplateResourceResolver"
                class="org.bloomreach.forge.discovery.crisp.ConfigBackedDiscoveryResourceResolver">
            <property name="cacheEnabled" value="false"/>
            <property name="api" value="search"/>
          </bean>
        </beans>
    /hippo:configuration/hippo:modules/crispregistry/hippo:moduleconfig/crisp:resourceresolvercontainer/discoveryPathwaysAPI:
      jcr:primaryType: crisp:resourceresolver
      crisp:sitescopes:
        - platform
      crisp:beandefinition: |
        <beans xmlns="http://www.springframework.org/schema/beans"
               xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
               xsi:schemaLocation="http://www.springframework.org/schema/beans
                                   http://www.springframework.org/schema/beans/spring-beans-4.3.xsd">
          <bean parent="abstractCrispSimpleJacksonRestTemplateResourceResolver"
                class="org.bloomreach.forge.discovery.crisp.ConfigBackedDiscoveryResourceResolver">
            <property name="cacheEnabled" value="false"/>
            <property name="api" value="pathways"/>
          </bean>
        </beans>
    /hippo:configuration/hippo:modules/crispregistry/hippo:moduleconfig/crisp:resourceresolvercontainer/discoveryAutosuggestAPI:
      jcr:primaryType: crisp:resourceresolver
      crisp:sitescopes:
        - platform
      crisp:beandefinition: |
        <beans xmlns="http://www.springframework.org/schema/beans"
               xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
               xsi:schemaLocation="http://www.springframework.org/schema/beans
                                   http://www.springframework.org/schema/beans/spring-beans-4.3.xsd">
          <bean parent="abstractCrispSimpleJacksonRestTemplateResourceResolver"
                class="org.bloomreach.forge.discovery.crisp.ConfigBackedDiscoveryResourceResolver">
            <property name="cacheEnabled" value="false"/>
            <property name="api" value="autosuggest"/>
          </bean>
        </beans>
    /hippo:configuration/hippo:modules/crispregistry/hippo:moduleconfig/crisp:resourceresolvercontainer/discoveryPixelAPI:
      jcr:primaryType: crisp:resourceresolver
      crisp:sitescopes:
        - platform
      crisp:beandefinition: |
        <beans xmlns="http://www.springframework.org/schema/beans"
               xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
               xsi:schemaLocation="http://www.springframework.org/schema/beans
                                   http://www.springframework.org/schema/beans/spring-beans-4.3.xsd">
          <bean parent="abstractCrispSimpleJacksonRestTemplateResourceResolver"
                class="org.onehippo.cms7.crisp.core.resource.jackson.SimpleJacksonRestTemplateResourceResolver">
            <property name="cacheEnabled" value="false"/>
            <property name="baseUri" value="${crisp.discoveryPixelAPI.baseUri}"/>
          </bean>
        </beans>
      crisp:propnames:
        - crisp.discoveryPixelAPI.baseUri
      crisp:propvalues:
        - 'https://p.brsrvr.com'
    /hippo:configuration/hippo:modules/crispregistry/hippo:moduleconfig/crisp:resourceresolvercontainer/discoveryPixelAPIEU:
      jcr:primaryType: crisp:resourceresolver
