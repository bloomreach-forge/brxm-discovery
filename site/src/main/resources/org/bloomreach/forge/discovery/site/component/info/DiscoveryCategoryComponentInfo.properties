label.hint=Name published to the page cache. Set "Connects to label" on any Product Grid or Facets component to this same value.

defaultSort.hint=Discovery sort expression, e.g. "price asc" or "sale_price desc". Leave blank to use the Discovery account default.

statsFields.hint=Comma-separated field names for price range stats, e.g. "price,sale_price". Used to power price range facets.

segment.hint=Discovery segment identifier for personalised results. Leave blank if not using segmentation.

exclusionFilter.hint=Discovery efq expression to exclude products from results, e.g. "price:[50 TO *]". Leave blank for no exclusions.
