group-Pixel Tracking=Pixel Tracking
group-Discovery Credentials=Discovery Credentials

discoveryPixelsEnabled=Send pixel events
discoveryPixelsEnabled.hint=Fire server-side impression pixels to Bloomreach Analytics after each page render. Uncheck to suppress all pixel calls for this channel.

discoveryPixelTestData=Mark pixels as test data
discoveryPixelTestData.hint=Appends test_data=true to all pixel calls. Use in QA or staging to prevent test traffic from polluting production analytics.

discoveryPixelDebug=Pixel debug mode
discoveryPixelDebug.hint=Appends debug=true to all pixel calls for Bloomreach support diagnostics. Leave off in production.

discoveryPixelRegion=Pixel region
discoveryPixelRegion.hint=Selects the Bloomreach pixel endpoint region. Use EU for GDPR-compliant EU data residency. Overridden by system property brxdis.pixel.region when set.

discoveryAccountId=Account ID
discoveryAccountId.hint=Bloomreach Discovery account ID. Used as fallback when neither the BRXDIS_ACCOUNT_ID environment variable nor the brxdis.accountId system property is set. Leave blank to rely on env/system configuration.

discoveryDomainKey=Domain key
discoveryDomainKey.hint=Bloomreach Discovery domain key for this channel. Used as fallback when neither the BRXDIS_DOMAIN_KEY environment variable nor the brxdis.domainKey system property is set. Leave blank to rely on env/system configuration.

discoveryApiKeyEnvVar=API key env variable
discoveryApiKeyEnvVar.hint=Name of the environment variable containing the Bloomreach Discovery API key for this channel (e.g. SITE_A_API_KEY). The plugin calls System.getenv() with this name. Used only when the global BRXDIS_API_KEY env var and brxdis.apiKey system property are both absent. Leave blank to rely on global configuration.

discoveryAuthKeyEnvVar=Auth key env variable
discoveryAuthKeyEnvVar.hint=Name of the environment variable containing the Bloomreach v2 Pathways auth key for this channel (e.g. SITE_A_AUTH_KEY). Used only when global resolution returns blank. Leave blank if using v1 API or relying on global configuration.
