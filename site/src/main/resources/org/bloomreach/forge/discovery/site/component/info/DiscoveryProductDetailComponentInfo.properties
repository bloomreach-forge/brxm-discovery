label.hint=Name published to the page cache. Set "Connects to label" on any Recommendations component using "Linked to Product Detail" to this same value.

productPidProperty.hint=Advanced: JCR property on the page content bean to read the product ID from. Only used when no PID is resolved from the URL or document picker.

productUrlParam.hint=URL query parameter that carries the product ID (e.g. "?pid=123"). Change only if your URL scheme uses a different parameter name.
