dataSource/standalone=Independent
dataSource/productDetailBand=Linked to Product Detail

dataSource.hint=Choose how this widget finds its context product. \
  "Independent" resolves the product from the URL or component settings. \
  "Linked to Product Detail" reads the product already shown by a Product Detail \
  component on this page — that component must appear above this one in the layout.

connectTo.hint=Must match the Label value set on the source component \
  (Product Detail, Search, or Category) that this widget connects to.
